<!-- Base path detection and small fixes: compute basePath and use it for fetches and image paths -->
<script>
    (function(){
        // Compute basePath for assets so site works under root or a subpath (e.g., GitHub Pages)
        function computeBasePath() {
            // If a <base href> is set, use it
            const baseTag = document.querySelector('base');
            if (baseTag) return baseTag.getAttribute('href') || './';
            // Otherwise compute from location.pathname
            const path = location.pathname;
            // If the site is served as /owner/repo/Globalx/index.html, we want the directory part
            const idx = path.lastIndexOf('/');
            if (idx === -1) return './';
            return path.substring(0, idx + 1);
        }

        window.GLOBALX_BASE = computeBasePath();

        // Wrap the existing loadPlayers to use base path
        const originalLoad = window.loadPlayers;
        window.loadPlayers = async function() {
            try {
                const jsonUrl = GLOBALX_BASE + 'assets/players.json';
                const res = await fetch(jsonUrl);
                if (!res.ok) throw new Error('Failed to load players.json at ' + jsonUrl + ' (status ' + res.status + ')');
                const players = await res.json();
                // Ensure avatars are correctly prefixed if they are relative
                players.forEach(p => {
                    if (p.avatar && !p.avatar.startsWith('http') && !p.avatar.startsWith('/')) {
                        p.avatar = GLOBALX_BASE + p.avatar;
                    }
                });
                // Call the original populate/build with players
                if (typeof populateTable === 'function') populateTable(players);
                if (typeof buildCharts === 'function') buildCharts(players);

                // setup export link to download JSON
                const blob = new Blob([JSON.stringify(players, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const exportLink = document.getElementById('exportLink');
                if (exportLink) { exportLink.href = url; exportLink.download = 'globalx_players_leaderboard.json'; }
                // Also set fallback href to the source JSON to support direct download
                if (exportLink) exportLink.dataset.fallback = jsonUrl;

                // filter checkboxes
                const fPro = document.getElementById('filterPro');
                const fAdv = document.getElementById('filterAdv');
                const fAm = document.getElementById('filterAm');
                if (fPro) fPro.addEventListener('change', () => applyFilters(players));
                if (fAdv) fAdv.addEventListener('change', () => applyFilters(players));
                if (fAm) fAm.addEventListener('change', () => applyFilters(players));

            } catch (err) {
                console.error(err);
                // Show a small inline warning if the players section exists
                const rankingsSection = document.getElementById('rankings');
                if (rankingsSection) {
                    const warn = document.createElement('div');
                    warn.className = 'mt-4 p-3 bg-red-50 text-red-700 rounded';
                    warn.textContent = 'Failed to load player data. Please check assets/players.json path.';
                    rankingsSection.prepend(warn);
                }
            }
        }

        // Override DOMContentLoaded to ensure we use the new loader if the original wasn't present
        document.addEventListener('DOMContentLoaded', function(){
            if (typeof originalLoad === 'function') {
                // originalLoad will be invoked by the existing script; but call ours too to ensure path is correct
                window.loadPlayers();
            } else {
                // call our loader as standalone
                window.loadPlayers();
            }
        });

        // Small CSS fallback for checkboxes (Tailwind form-checkbox may be missing)
        const style = document.createElement('style');
        style.textContent = '\n            input[type=checkbox].form-checkbox { width: 1.15rem; height: 1.15rem; border-radius: 0.25rem; border: 1px solid #cbd5e1; display: inline-block; vertical-align: middle; }\n            input[type=checkbox].form-checkbox:checked { background-color: #0F4C81; border-color: #0F4C81; }\n        ';
        document.head.appendChild(style);
    })();
</script>
