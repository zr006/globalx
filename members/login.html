<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Member Login — Globalx</title>
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="logo">Globalx</div>
      <nav class="main-nav">
        <a href="/index.html">Home</a>
        <a href="/events.html">Events</a>
        <a href="/gallery">Gallery</a>
        <a href="/contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container members">
    <h1>Member Login</h1>
    <div class="members-grid">
      <div class="card">
        <h3>Sign in</h3>
        <form class="login-form" onsubmit="event.preventDefault(); alert('This is a demo login. Connect to an auth provider to enable real login.');">
          <label>Email <input type="email" required></label>
          <label>Password <input type="password" required></label>
          <button class="btn">Sign in</button>
        </form>
        <p style="margin-top:12px">Don't have an account? <a href="/members/register.html">Register</a></p>
      </div>

      <div class="card">
        <h3>Or sign in with</h3>
        <p><button class="btn" onclick="alert('OAuth demo — configure OAuth in your backend or use a service like Auth0/Netlify Identity')">Sign in with Google</button></p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> Globalx — Promoting Pickleball</p>
    </div>
  </footer>
  <script src="/js/script.js"></script>
</body>
</html>
